<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学城美食地图 - 登录</title>
  <link rel="stylesheet" href="../styles/common.css">
  <script src="../js/config.js"></script>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-primary);
    }

    .login-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .login-header {
      padding: var(--space-12) var(--space-8) var(--space-10);
      text-align: center;
    }

    .brand-name {
      font-size: 36px;
      font-weight: 900;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
    }

    .brand-slogan {
      font-size: 18px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .login-cards {
      display: flex;
      align-items: flex-start;
      gap: var(--space-10);
      max-width: 1000px;
      width: 100%;
      padding: 0 var(--space-8);
      margin-top: var(--space-4);
    }

    .login-card {
      flex: 1;
      max-width: 420px;
      min-width: 280px;
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      box-shadow: var(--shadow-hard);
      padding: var(--space-10);
      display: flex;
      flex-direction: column;
      height: auto;
    }

    .card-emoji {
      font-size: 36px;
      margin-bottom: var(--space-5);
    }

    .card-title {
      font-size: 20px;
      font-weight: 900;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: var(--space-8);
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: var(--space-5);
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .input-wrapper {
      position: relative;
    }

    .login-card .input {
      width: 100%;
      height: 48px;
      padding: 0 var(--space-4);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      font-size: 15px;
      font-weight: 500;
      background: var(--bg-secondary);
    }

    .login-card .submit-btn {
      width: 100%;
      height: 52px;
      margin-top: var(--space-4);
      font-size: 17px;
      font-weight: 900;
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      box-shadow: var(--shadow-hard);
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .login-card .submit-btn:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .login-card .submit-btn.student {
      background: var(--accent-orange);
      color: var(--text-inverted);
    }

    .login-card .submit-btn.merchant {
      background: var(--accent-yellow);
      color: var(--text-primary);
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--space-4);
      font-size: 14px;
      font-weight: 500;
    }

    .form-footer a {
      color: var(--accent-pink);
      text-decoration: none;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-5) 0;
      color: var(--text-tertiary);
      font-size: 14px;
      font-weight: 500;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-black);
    }

    .guest-btn {
      width: 100%;
      height: 52px;
      font-size: 16px;
      font-weight: 900;
      background: var(--accent-yellow);
      color: var(--text-primary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      box-shadow: var(--shadow-hard);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .guest-btn:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .or-separator {
      display: flex;
      align-items: center;
      padding: 0 var(--space-8);
      margin-top: 13.5rem;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .login-footer {
      padding: var(--space-6);
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .error-message {
      background: #FEE2E2;
      color: #B91C1C;
      padding: var(--space-3) var(--space-4);
      border: 2px solid var(--border-black);
      font-size: 13px;
      margin-bottom: var(--space-4);
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      cursor: pointer;
      font-weight: 500;
    }

    .remember-label input {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 640px) {
      .login-cards {
        flex-direction: column;
        align-items: center;
        gap: var(--space-6);
      }

      .or-separator {
        padding: var(--space-6) 0;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <main class="login-main">
      <header class="login-header">
        <h1 class="brand-name">大学城美食地图</h1>
        <p class="brand-slogan">校友吃什么，你看就知道</p>
      </header>

      <div class="login-cards">
      <!-- 学生端卡片 -->
      <div class="login-card" id="studentCard">
        <div class="card-emoji">👨‍🎓</div>
        <h2 class="card-title">我是学生</h2>
        <p class="card-desc">探索周边美食，发现校友推荐</p>

        <div class="error-message" id="studentError"></div>

        <form id="studentForm">
          <div class="form-group">
            <label class="form-label">手机号</label>
            <div class="input-wrapper">
              <input type="tel" class="input" id="phoneInput" placeholder="请输入手机号" maxlength="11" value="13800138001">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="input-wrapper">
              <input type="password" class="input" id="passwordInput" placeholder="请输入密码" value="123456">
            </div>
          </div>

          <button type="submit" class="submit-btn student" id="studentSubmitBtn">登 录</button>
        </form>

        <div class="form-footer">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" checked>
            <span>记住我</span>
          </label>
          <a href="#">忘记密码？</a>
        </div>

        <div class="divider">快速体验</div>

        <button type="button" class="guest-btn" id="guestBtn">
          游客模式（免登录）
        </button>
      </div>

      <div class="or-separator">— OR —</div>

      <!-- 商家端卡片 -->
      <div class="login-card" id="merchantCard">
        <div class="card-emoji">🏪</div>
        <h2 class="card-title">我是商家</h2>
        <p class="card-desc">管理店铺信息，查看经营数据</p>

        <div class="error-message" id="merchantError"></div>

        <form id="merchantForm">
          <div class="form-group">
            <label class="form-label">账号</label>
            <div class="input-wrapper">
              <input type="text" class="input" id="merchantAccount" placeholder="请输入账号" value="13800138002">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="input-wrapper">
              <input type="password" class="input" id="merchantPassword" placeholder="请输入密码">
            </div>
          </div>

          <button type="submit" class="submit-btn merchant" id="merchantSubmitBtn">登录商家端</button>
        </form>
      </div>
    </div>
    </main>

    <footer class="login-footer">
      <p>©2026 大学城美食地图，让每一餐都有迹可循</p>
    </footer>
  </div>

  <script>
    const studentForm = document.getElementById('studentForm');
    const merchantForm = document.getElementById('merchantForm');
    const phoneInput = document.getElementById('phoneInput');
    const passwordInput = document.getElementById('passwordInput');
    const studentSubmitBtn = document.getElementById('studentSubmitBtn');
    const merchantSubmitBtn = document.getElementById('merchantSubmitBtn');
    const studentError = document.getElementById('studentError');
    const merchantError = document.getElementById('merchantError');
    const guestBtn = document.getElementById('guestBtn');

    function showStudentError(msg) {
      studentError.textContent = msg;
      studentError.classList.add('show');
      setTimeout(() => studentError.classList.remove('show'), 3000);
    }

    function showMerchantError(msg) {
      merchantError.textContent = msg;
      merchantError.classList.add('show');
      setTimeout(() => merchantError.classList.remove('show'), 3000);
    }

    // 学生登录
    studentForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = phoneInput.value.trim();
      const password = passwordInput.value;

      if (!phone) {
        showStudentError('请输入手机号');
        return;
      }
      if (!password) {
        showStudentError('请输入密码');
        return;
      }

      studentSubmitBtn.disabled = true;
      studentSubmitBtn.textContent = '登录中...';

      try {
        const res = await fetch(window.apiUrl('/api/auth/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password, userType: 1 })
        });
        const data = await res.json();

        if (data.code === 200) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          window.location.href = window.toPage('/home');
        } else {
          showStudentError(data.message || '登录失败');
        }
      } catch (err) {
        showStudentError('网络错误，请稍后重试');
      } finally {
        studentSubmitBtn.disabled = false;
        studentSubmitBtn.textContent = '登 录';
      }
    });

    // 商家登录
    merchantForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const account = document.getElementById('merchantAccount').value.trim();
      const password = document.getElementById('merchantPassword').value;

      if (!account) {
        showMerchantError('请输入账号');
        return;
      }
      if (!password) {
        showMerchantError('请输入密码');
        return;
      }

      merchantSubmitBtn.disabled = true;
      merchantSubmitBtn.textContent = '登录中...';

      try {
        const res = await fetch(window.apiUrl('/api/auth/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: account, password, userType: 2 })
        });
        const data = await res.json();

        if (data.code === 200) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          window.location.href = window.toPage('/merchant-dashboard');
        } else {
          showMerchantError(data.message || '登录失败');
        }
      } catch (err) {
        showMerchantError('网络错误，请稍后重试');
      } finally {
        merchantSubmitBtn.disabled = false;
        merchantSubmitBtn.textContent = '登录商家端';
      }
    });

    // 游客模式
    guestBtn.addEventListener('click', () => {
      localStorage.setItem('guestMode', 'true');
      window.location.href = window.toPage('/home');
    });

    // 已登录则跳转
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (token && user.user_type) {
      window.location.href = window.toPage(user.user_type === 2 ? '/merchant-dashboard' : '/home');
    }
  </script>
</body>
</html>
