<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学城美食地图 - 登录</title>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, var(--primary-50) 0%, var(--bg-secondary) 100%);
    }

    .login-header {
      padding: var(--space-8) var(--space-6);
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-4);
      box-shadow: var(--shadow-button);
      font-size: 40px;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .brand-slogan {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .login-container {
      flex: 1;
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      padding: var(--space-6);
    }

    .user-type-tabs {
      display: flex;
      gap: var(--space-2);
      background: var(--bg-canvas);
      padding: 4px;
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-6);
    }

    .user-type-tab {
      flex: 1;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
    }

    .user-type-tab.active {
      background: var(--bg-primary);
      color: var(--primary-500);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .user-type-tab .icon {
      font-size: 18px;
    }

    .login-form {
      background: var(--bg-primary);
      padding: var(--space-8);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
    }

    .form-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: var(--space-6);
      text-align: center;
    }

    .form-group {
      margin-bottom: var(--space-5);
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 18px;
    }

    .input.with-icon {
      padding-left: 44px;
    }

    .submit-btn {
      width: 100%;
      height: 48px;
      margin-top: var(--space-4);
      font-size: 16px;
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--space-5);
      font-size: 13px;
    }

    .form-footer a {
      color: var(--primary-500);
      text-decoration: none;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-6) 0;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .guest-btn {
      width: 100%;
    }

    .login-footer {
      padding: var(--space-6);
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .error-message {
      background: var(--error-light);
      color: var(--error-dark);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-size: 13px;
      margin-bottom: var(--space-4);
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* 用户类型说明 */
    .user-type-info {
      background: var(--primary-50);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .user-type-info strong {
      color: var(--primary-700);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <header class="login-header">
      <div class="logo">🍜</div>
      <h1 class="brand-name">大学城美食地图</h1>
      <p class="brand-slogan">校友吃什么，你看就知道</p>
    </header>

    <div class="login-container">
      <!-- 用户类型切换 -->
      <div class="user-type-tabs">
        <button class="user-type-tab active" data-type="1">
          <span class="icon">👨‍🎓</span>
          <span>学生用户</span>
        </button>
        <button class="user-type-tab" data-type="2">
          <span class="icon">🏪</span>
          <span>商家入驻</span>
        </button>
      </div>

      <!-- 用户类型说明 -->
      <div class="user-type-info" id="userTypeInfo">
        <strong>👨‍🎓 学生用户：</strong>发现周边美食，查看实时客流，分享用餐体验
      </div>

      <!-- 登录表单 -->
      <div class="login-form">
        <h2 class="form-title" id="formTitle">学生登录</h2>
        
        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">手机号</label>
            <div class="input-wrapper">
              <span class="input-icon">📱</span>
              <input type="tel" class="input with-icon" id="phoneInput" placeholder="请输入手机号" maxlength="11" value="13800138001">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" class="input with-icon" id="passwordInput" placeholder="请输入密码" value="123456">
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg submit-btn" id="submitBtn">
            登 录
          </button>
        </form>

        <div class="form-footer">
          <label class="flex items-center gap-2" style="cursor: pointer;">
            <input type="checkbox" checked>
            <span>记住我</span>
          </label>
          <a href="#">忘记密码？</a>
        </div>

        <div class="divider">快速体验</div>

        <button type="button" class="btn btn-secondary guest-btn" id="guestBtn">
          🚀 游客模式（免登录）
        </button>
      </div>
    </div>

    <footer class="login-footer">
      <p>© 2026 大学城美食地图 | 让校园生活更美味</p>
    </footer>
  </div>

  <script>
    // 用户类型配置
    const userTypeConfig = {
      1: {
        title: '学生登录',
        info: '<strong>👨‍🎓 学生用户：</strong>发现周边美食，查看实时客流，分享用餐体验',
        defaultPhone: '13800138001',
        redirect: '/home'
      },
      2: {
        title: '商家登录',
        info: '<strong>🏪 商家入驻：</strong>管理店铺信息，更新实时状态，查看经营数据',
        defaultPhone: '13800138002',
        redirect: '/merchant-dashboard'
      }
    };

    let currentUserType = 1;

    // DOM元素
    const userTypeTabs = document.querySelectorAll('.user-type-tab');
    const userTypeInfo = document.getElementById('userTypeInfo');
    const formTitle = document.getElementById('formTitle');
    const phoneInput = document.getElementById('phoneInput');
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');
    const guestBtn = document.getElementById('guestBtn');

    // 切换用户类型
    userTypeTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const type = parseInt(tab.dataset.type);
        currentUserType = type;

        // 更新tab样式
        userTypeTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // 更新表单信息
        const config = userTypeConfig[type];
        formTitle.textContent = config.title;
        userTypeInfo.innerHTML = config.info;
        phoneInput.value = config.defaultPhone;
      });
    });

    // 显示错误信息
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 3000);
    }

    // 登录表单提交
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const phone = phoneInput.value.trim();
      const password = document.getElementById('passwordInput').value;

      if (!phone) {
        showError('请输入手机号');
        return;
      }

      if (!password) {
        showError('请输入密码');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password, userType: currentUserType })
        });

        const data = await response.json();

        if (data.code === 200) {
          // 保存登录信息
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          
          // 跳转到对应页面
          window.location.href = userTypeConfig[currentUserType].redirect;
        } else {
          showError(data.message || '登录失败');
        }
      } catch (error) {
        showError('网络错误，请稍后重试');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登 录';
      }
    });

    // 游客模式
    guestBtn.addEventListener('click', () => {
      localStorage.setItem('guestMode', 'true');
      window.location.href = '/home';
    });

    // 检查是否已登录
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (token && user.user_type) {
      // 已登录，直接跳转
      window.location.href = userTypeConfig[user.user_type]?.redirect || '/home';
    }
  </script>
</body>
</html>
