<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <title>个人中心 - 大学城美食地图</title>
  <link rel="stylesheet" href="../styles/common.css">
  <script src="../js/config.js"></script>
  <style>
    /* Neo-Brutalism 2.0 - 个人中心 */
    .profile-page {
      min-height: 100vh;
      background: var(--bg-primary);
    }

    .top-nav {
      position: sticky;
      top: 0;
      height: 64px;
      background: var(--bg-primary);
      border-bottom: 3px solid var(--border-black);
      display: flex;
      align-items: center;
      padding: 0 var(--space-6);
      gap: var(--space-4);
      z-index: 100;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      box-shadow: var(--shadow-hard);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .back-btn:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .nav-title {
      font-size: 18px;
      font-weight: 900;
      flex: 1;
      color: var(--text-primary);
    }

    .nav-action {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-blue);
      cursor: pointer;
      padding: var(--space-2) var(--space-3);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      background: var(--bg-secondary);
      box-shadow: var(--shadow-hard);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .nav-action:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0;
      display: grid;
      grid-template-columns: 35% 1fr;
      gap: 0;
      min-height: calc(100vh - 64px);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      padding: var(--space-6);
    }

    .user-card {
      background: var(--accent-orange);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      padding: var(--space-8);
      color: var(--text-inverted);
      box-shadow: var(--shadow-hard);
      text-align: center;
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto var(--space-5);
      box-shadow: var(--shadow-hard);
    }

    .user-name {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: var(--space-2);
      letter-spacing: -0.02em;
      color: var(--text-inverted);
    }

    .user-school {
      font-size: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
      padding: var(--space-1) var(--space-3);
      background: var(--accent-yellow);
      color: var(--text-primary);
      border: 2px solid var(--border-black);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .user-stats {
      display: flex;
      justify-content: space-around;
      padding-top: var(--space-5);
      border-top: 2.5px solid var(--border-black);
    }

    .stat-item {
      text-align: center;
      padding: var(--space-2);
      border: 2px solid var(--border-black);
      min-width: 0;
    }

    .user-stats .stat-item:nth-child(1) { background: var(--accent-green); }
    .user-stats .stat-item:nth-child(2) { background: var(--accent-blue); }
    .user-stats .stat-item:nth-child(3) { background: var(--accent-orange); }

    .stat-value {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: var(--space-1);
      color: var(--text-inverted);
    }

    .stat-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-inverted);
      opacity: 0.95;
    }

    .quick-actions {
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      box-shadow: var(--shadow-hard);
      padding: var(--space-5);
    }

    .quick-title {
      font-size: 15px;
      font-weight: 900;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
    }

    .quick-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      cursor: pointer;
      box-shadow: var(--shadow-hard);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .quick-item:nth-child(1) { background: var(--accent-yellow); }
    .quick-item:nth-child(2) { background: var(--accent-pink); color: var(--text-inverted); }
    .quick-item:nth-child(3) { background: var(--accent-blue); color: var(--text-inverted); }
    .quick-item:nth-child(4) { background: var(--accent-green); }

    .quick-item:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .quick-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .quick-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .quick-item:nth-child(2) .quick-label,
    .quick-item:nth-child(3) .quick-label { color: var(--text-inverted); }

    .logout-btn {
      width: 100%;
      height: 48px;
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
      box-shadow: var(--shadow-hard);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .logout-btn:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .main-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      padding: var(--space-6);
      border-left: 3px solid var(--border-black);
    }

    .content-section {
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      box-shadow: var(--shadow-hard);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-5) var(--space-6);
      border-bottom: 2.5px solid var(--border-black);
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
      color: var(--text-primary);
    }

    .section-action {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-blue);
      cursor: pointer;
    }

    .section-action:hover {
      text-decoration: underline;
    }

    .section-body {
      padding: var(--space-5) var(--space-6);
    }

    .favorites-grid {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .favorite-card {
      display: flex;
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow-hard);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .favorite-card:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .favorite-card {
      border-left: 5px solid var(--accent-orange);
    }

    .favorite-image {
      height: 80px;
      width: 80px;
      background: var(--accent-orange);
      border-right: 2.5px solid var(--border-black);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .favorite-info {
      flex: 1;
      padding: var(--space-4);
    }

    .favorite-name {
      font-size: 16px;
      font-weight: 900;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
    }

    .favorite-meta {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
    }

    .menu-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-5);
      background: var(--bg-primary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--shadow-hard);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .menu-item:hover {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .menu-icon {
      width: 56px;
      height: 56px;
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .menu-label {
      font-size: 15px;
      font-weight: 900;
      color: var(--text-primary);
    }

    .menu-desc {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .menu-badge {
      position: absolute;
      top: var(--space-2);
      right: var(--space-2);
      padding: var(--space-1) var(--space-2);
      background: var(--accent-pink);
      color: var(--text-primary);
      border: 2px solid var(--border-black);
      border-radius: 0;
      font-size: 11px;
      font-weight: 900;
    }

    .settings-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .setting-item {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-black);
      border-radius: 0;
      cursor: pointer;
      transition: background 0.1s ease;
    }

    .setting-item:last-child {
      border-bottom: none;
    }

    .setting-item:hover {
      background: var(--accent-yellow);
    }

    .setting-icon {
      width: 44px;
      height: 44px;
      background: var(--bg-secondary);
      border: 2.5px solid var(--border-black);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .setting-content {
      flex: 1;
    }

    .setting-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
    }

    .setting-desc {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .setting-arrow {
      font-size: 18px;
      font-weight: 900;
      color: var(--text-primary);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12);
      color: var(--text-secondary);
      font-weight: 700;
    }

    .empty-icon {
      font-size: 80px;
      margin-bottom: var(--space-4);
    }

    .empty-text {
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="profile-page">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <button class="back-btn" onclick="goHome()">←</button>
      <span class="nav-title">个人中心</span>
      <span class="nav-action" id="editBtn">编辑资料</span>
    </nav>

    <!-- Web端主布局 -->
    <div class="main-container">
      <!-- 左侧边栏 -->
      <aside class="sidebar">
        <!-- 用户信息卡片 -->
        <div class="user-card">
          <div class="user-avatar" id="userAvatar">👤</div>
          <h1 class="user-name" id="userName">加载中...</h1>
          <div class="user-school">
            <span>🎓</span>
            <span id="userSchool">清华大学</span>
          </div>
          <div class="user-stats">
            <div class="stat-item">
              <div class="stat-value" id="favoritesCount">0</div>
              <div class="stat-label">收藏</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="reviewsCount">0</div>
              <div class="stat-label">评价</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="pointsCount">0</div>
              <div class="stat-label">积分</div>
            </div>
          </div>
        </div>

        <!-- 快捷操作 -->
        <div class="quick-actions">
          <div class="quick-title">⚡ 快捷操作</div>
          <div class="quick-grid">
            <div class="quick-item" onclick="goToHistory()">
              <div class="quick-icon">🕐</div>
              <span class="quick-label">浏览历史</span>
            </div>
            <div class="quick-item" onclick="goToReviews()">
              <div class="quick-icon">⭐</div>
              <span class="quick-label">我的评价</span>
            </div>
            <div class="quick-item">
              <div class="quick-icon">🎁</div>
              <span class="quick-label">积分中心</span>
            </div>
            <div class="quick-item">
              <div class="quick-icon">🎫</div>
              <span class="quick-label">优惠券</span>
            </div>
          </div>
        </div>

        <!-- 退出登录 -->
        <button class="logout-btn" id="logoutBtn">退出登录</button>
      </aside>

      <!-- 右侧主内容 -->
      <main class="main-content">
        <!-- 我的收藏 -->
        <div class="content-section">
          <div class="section-header">
            <span class="section-title">❤️ 我的收藏</span>
            <span class="section-action" onclick="goToFavorites()">查看全部 ›</span>
          </div>
          <div class="section-body">
            <div class="favorites-grid" id="favoritesGrid">
              <div class="empty-state">
                <div class="empty-icon">🍽️</div>
                <div class="empty-text">暂无收藏商家</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 功能菜单 -->
        <div class="content-section">
          <div class="section-header">
            <span class="section-title">📋 功能菜单</span>
          </div>
          <div class="section-body">
            <div class="menu-grid">
              <div class="menu-item" onclick="goToHistory()">
                <div class="menu-icon">🕐</div>
                <div class="menu-label">浏览历史</div>
                <div class="menu-desc">最近查看过的商家</div>
              </div>
              <div class="menu-item" onclick="goToReviews()">
                <div class="menu-icon">⭐</div>
                <div class="menu-label">我的评价</div>
                <div class="menu-desc">管理我的评价内容</div>
              </div>
              <div class="menu-item">
                <div class="menu-icon">🎁</div>
                <div class="menu-label">积分中心</div>
                <div class="menu-desc">签到、任务、兑换</div>
                <span class="menu-badge">NEW</span>
              </div>
              <div class="menu-item">
                <div class="menu-icon">🎫</div>
                <div class="menu-label">优惠券</div>
                <div class="menu-desc">我的优惠券包</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 设置 -->
        <div class="content-section">
          <div class="section-header">
            <span class="section-title">⚙️ 设置</span>
          </div>
          <div class="section-body">
            <div class="settings-grid">
              <div class="setting-item">
                <div class="setting-icon">🔔</div>
                <div class="setting-content">
                  <div class="setting-label">消息通知</div>
                  <div class="setting-desc">管理推送通知设置</div>
                </div>
                <span class="setting-arrow">›</span>
              </div>
              <div class="setting-item">
                <div class="setting-icon">🔒</div>
                <div class="setting-content">
                  <div class="setting-label">隐私设置</div>
                  <div class="setting-desc">管理个人信息可见性</div>
                </div>
                <span class="setting-arrow">›</span>
              </div>
              <div class="setting-item">
                <div class="setting-icon">❓</div>
                <div class="setting-content">
                  <div class="setting-label">帮助与反馈</div>
                  <div class="setting-desc">常见问题、意见反馈</div>
                </div>
                <span class="setting-arrow">›</span>
              </div>
              <div class="setting-item">
                <div class="setting-icon">ℹ️</div>
                <div class="setting-content">
                  <div class="setting-label">关于我们</div>
                  <div class="setting-desc">版本信息、联系方式</div>
                </div>
                <span class="setting-arrow">›</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadUserProfile();
      loadFavorites();
      bindEvents();
    });

    // 加载用户信息
    async function loadUserProfile() {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      
      if (user.nickname) {
        document.getElementById('userName').textContent = user.nickname;
        document.getElementById('userAvatar').textContent = user.nickname.charAt(0);
      }

      try {
        const response = await fetch(window.apiUrl(`/api/users/profile?user_id=${user.id || 1}`));
        const data = await response.json();

        if (data.code === 200) {
          const profile = data.data;
          document.getElementById('userName').textContent = profile.nickname || '美食探索者';
          document.getElementById('userAvatar').textContent = (profile.nickname || '👤').charAt(0);
          document.getElementById('favoritesCount').textContent = profile.favorite_count || 0;
          document.getElementById('reviewsCount').textContent = profile.review_count || 0;
          document.getElementById('pointsCount').textContent = profile.points || 0;
        }
      } catch (error) {
        console.error('加载用户信息失败:', error);
        document.getElementById('userName').textContent = user.nickname || '美食探索者';
        document.getElementById('favoritesCount').textContent = '3';
        document.getElementById('reviewsCount').textContent = '5';
        document.getElementById('pointsCount').textContent = '128';
      }
    }

    // 加载收藏
    async function loadFavorites() {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      
      try {
        const response = await fetch(window.apiUrl(`/api/users/favorites?user_id=${user.id || 1}`));
        const data = await response.json();

        if (data.code === 200 && data.data.length > 0) {
          renderFavorites(data.data);
        } else {
          renderFavorites([
            { target_id: 6, merchant_name: '老成都火锅', review_avg_score: 4.8, price_per_person: 68 },
            { target_id: 17, merchant_name: '喜茶', review_avg_score: 4.6, price_per_person: 28 },
            { target_id: 11, merchant_name: '老北京炸酱面馆', review_avg_score: 4.6, price_per_person: 35 }
          ]);
        }
      } catch (error) {
        console.error('加载收藏失败:', error);
        renderFavorites([
          { target_id: 6, merchant_name: '老成都火锅', review_avg_score: 4.8, price_per_person: 68 },
          { target_id: 17, merchant_name: '喜茶', review_avg_score: 4.6, price_per_person: 28 }
        ]);
      }
    }

    // 渲染收藏
    function renderFavorites(favorites) {
      const container = document.getElementById('favoritesGrid');
      
      if (favorites.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-icon">🍽️</div>
            <div class="empty-text">暂无收藏商家</div>
          </div>
        `;
        return;
      }

      container.innerHTML = favorites.map(f => `
        <div class="favorite-card" onclick="goToMerchant(${f.target_id})">
          <div class="favorite-image">🍽️</div>
          <div class="favorite-info">
            <div class="favorite-name">${f.merchant_name}</div>
            <div class="favorite-meta">
              ★ ${f.review_avg_score} · ¥${f.price_per_person}/人
            </div>
          </div>
        </div>
      `).join('');
    }

    // 绑定事件
    function bindEvents() {
      // 退出登录
      document.getElementById('logoutBtn').addEventListener('click', () => {
        if (confirm('确定要退出登录吗？')) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          localStorage.removeItem('guestMode');
          window.location.href = window.toPage('/');
        }
      });

      // 编辑资料
      document.getElementById('editBtn').addEventListener('click', () => {
        alert('编辑资料功能开发中...');
      });
    }

    // 跳转函数
    function goHome() {
      window.location.href = window.toPage('/home');
    }

    function goToMerchant(id) {
      window.location.href = window.toPage(`/merchant/${id}`);
    }

    function goToFavorites() {
      // 可以跳转到专门的收藏页面
      alert('查看全部收藏');
    }

    function goToHistory() {
      alert('浏览历史功能开发中...');
    }

    function goToReviews() {
      alert('我的评价功能开发中...');
    }
  </script>
</body>
</html>
