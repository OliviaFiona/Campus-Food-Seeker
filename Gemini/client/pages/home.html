<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <title>大学城美食地图 - 首页</title>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    /* 页面布局 */
    .home-page {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左侧导航栏 */
    .sidebar {
      width: 220px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header {
      padding: var(--space-5) var(--space-5) var(--space-4);
      border-bottom: 1px solid var(--border-light);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: var(--shadow-button);
    }

    .brand-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .nav-menu {
      flex: 1;
      padding: var(--space-4);
      overflow-y: auto;
    }

    .nav-section {
      margin-bottom: var(--space-5);
    }

    .nav-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 var(--space-3);
      margin-bottom: var(--space-2);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
    }

    .nav-item:hover {
      background: var(--primary-50);
      color: var(--primary-600);
    }

    .nav-item.active {
      background: var(--primary-50);
      color: var(--primary-600);
    }

    .nav-item .icon {
      font-size: 20px;
      width: 24px;
      text-align: center;
    }

    .nav-sub-items {
      margin-left: var(--space-8);
      margin-top: var(--space-1);
    }

    .nav-sub-item {
      padding: var(--space-2) var(--space-3);
      font-size: 13px;
      color: var(--text-tertiary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }

    .nav-sub-item:hover {
      color: var(--primary-600);
      background: var(--primary-50);
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* 顶部导航栏 */
    .top-nav {
      height: 64px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 var(--space-6);
      gap: var(--space-6);
      z-index: 90;
    }

    .location-selector {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-canvas);
      border-radius: var(--radius-md);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .location-selector:hover {
      background: var(--primary-50);
    }

    .search-bar {
      flex: 1;
      max-width: 480px;
    }

    .top-nav-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-left: auto;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      border: none;
      font-size: 20px;
    }

    .icon-btn:hover {
      background: var(--bg-canvas);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--primary-400), var(--primary-500));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border: 2px solid var(--border-light);
    }

    /* 地图容器 */
    .map-container {
      flex: 1;
      position: relative;
      background: #f0f2f5;
    }

    #amap-container {
      width: 100%;
      height: 100%;
    }

    /* 地图覆盖控件 */
    .map-overlay {
      position: absolute;
      top: var(--space-4);
      left: var(--space-4);
      z-index: 10;
    }

    .filter-chips {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-primary);
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border-light);
    }

    .filter-chip:hover,
    .filter-chip.active {
      background: var(--primary-500);
      color: white;
      border-color: var(--primary-500);
    }

    /* 地图图例 */
    .map-legend {
      position: absolute;
      bottom: 320px;
      left: var(--space-4);
      background: rgba(255, 255, 255, 0.95);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      z-index: 10;
    }

    .legend-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-3);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
    }

    /* 底部Sheet */
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
      z-index: 50;
      transition: transform 0.3s ease;
      /* 默认收起状态，只显示handle部分 */
      transform: translateY(calc(100% - 40px));
    }

    .bottom-sheet.expanded {
      transform: translateY(0);
    }

    .bottom-sheet-handle {
      display: flex;
      justify-content: center;
      padding: var(--space-2) 0;
      cursor: pointer;
    }

    .handle-bar {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: var(--radius-full);
    }

    .bottom-sheet-content {
      padding: 0 var(--space-5) var(--space-5);
    }

    .sheet-filters {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border-light);
    }

    .sheet-filter {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-canvas);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }

    .sheet-filter:hover {
      border-color: var(--primary-300);
    }

    .sheet-tabs {
      display: flex;
      gap: var(--space-6);
      margin-bottom: var(--space-4);
    }

    .sheet-tab {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-tertiary);
      padding-bottom: var(--space-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s ease;
    }

    .sheet-tab:hover,
    .sheet-tab.active {
      color: var(--primary-500);
      border-bottom-color: var(--primary-500);
    }

    /* 商家卡片流 */
    .merchant-carousel {
      display: flex;
      gap: var(--space-4);
      overflow-x: auto;
      padding-bottom: var(--space-2);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .merchant-carousel::-webkit-scrollbar {
      height: 6px;
    }

    .merchant-carousel::-webkit-scrollbar-track {
      background: transparent;
    }

    .merchant-carousel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: var(--radius-full);
    }

    .merchant-card {
      flex-shrink: 0;
      width: 280px;
      background: var(--bg-primary);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .merchant-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-card-hover);
    }

    .merchant-card-image {
      position: relative;
      height: 140px;
      background: linear-gradient(135deg, var(--primary-100), var(--primary-200));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .merchant-status-badge {
      position: absolute;
      top: var(--space-3);
      left: var(--space-3);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      color: white;
    }

    .merchant-status-badge.idle { background: var(--status-idle); }
    .merchant-status-badge.busy { background: var(--status-busy); }
    .merchant-status-badge.full { background: var(--status-full); }
    .merchant-status-badge.queue { background: var(--status-queue); }

    .merchant-card-content {
      padding: var(--space-4);
    }

    .merchant-card-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .merchant-card-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .merchant-card-score {
      color: var(--warning);
      font-weight: 600;
    }

    .merchant-card-info {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .merchant-card-queue {
      color: var(--status-full);
      font-weight: 500;
    }

    /* 右侧详情页 */
    .detail-panel {
      position: absolute;
      top: 64px;
      right: 0;
      width: 420px;
      bottom: 0;
      background: var(--bg-primary);
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
      z-index: 80;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
    }

    .detail-panel.open {
      transform: translateX(0);
    }

    .detail-header {
      position: relative;
      height: 200px;
      background: linear-gradient(135deg, var(--primary-200), var(--primary-300));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .detail-close {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      border: none;
      box-shadow: var(--shadow-card);
    }

    .detail-favorite {
      position: absolute;
      top: var(--space-4);
      right: 60px;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      border: none;
      box-shadow: var(--shadow-card);
    }

    .detail-content {
      padding: var(--space-5);
    }

    .detail-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .detail-meta-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-size: 14px;
      color: var(--text-secondary);
    }

    .detail-status {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: var(--space-4);
    }

    .detail-status.idle { background: var(--success-light); color: var(--success); }
    .detail-status.busy { background: var(--warning-light); color: var(--warning-dark); }
    .detail-status.full { background: var(--error-light); color: var(--error-dark); }
    .detail-status.queue { background: #F3E8FF; color: #7C3AED; }

    .detail-actions {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .detail-action-btn {
      flex: 1;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      border-radius: var(--radius-lg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .detail-action-btn.primary {
      background: var(--primary-500);
      color: white;
      box-shadow: var(--shadow-button);
    }

    .detail-action-btn.primary:hover {
      background: var(--primary-600);
    }

    .detail-action-btn.secondary {
      background: var(--bg-canvas);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .detail-section {
      margin-bottom: var(--space-5);
    }

    .detail-section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .detail-tag {
      padding: var(--space-1) var(--space-3);
      background: var(--bg-canvas);
      border-radius: var(--radius-full);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .detail-address {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      font-size: 14px;
      color: var(--text-secondary);
      padding: var(--space-3);
      background: var(--bg-canvas);
      border-radius: var(--radius-lg);
    }

    /* 加载状态 */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--primary-100);
      border-top-color: var(--primary-500);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="home-page">
    <!-- 左侧导航栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">🍜</div>
          <span class="brand-text">美食地图</span>
        </div>
      </div>
      
      <nav class="nav-menu">
        <div class="nav-section">
          <div class="nav-title">探索</div>
          <div class="nav-item active" data-filter="nearby">
            <span class="icon">📍</span>
            <span>附近美食</span>
          </div>
          <div class="nav-item" data-filter="hot">
            <span class="icon">🔥</span>
            <span>热门推荐</span>
          </div>
          <div class="nav-sub-items" id="hotSubItems" style="display: none;">
            <div class="nav-sub-item" data-filter="hot-today">📈 今日热榜</div>
            <div class="nav-sub-item" data-filter="hot-week">🏆 本周排行</div>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-title">我的</div>
          <div class="nav-item" data-filter="favorites">
            <span class="icon">❤️</span>
            <span>我的收藏</span>
          </div>
          <div class="nav-item" data-page="profile">
            <span class="icon">👤</span>
            <span>个人中心</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-title">场景</div>
          <div class="nav-item" data-filter="scene-fast">
            <span class="icon">⚡</span>
            <span>课间快吃</span>
          </div>
          <div class="nav-item" data-filter="scene-gather">
            <span class="icon">🎉</span>
            <span>宿舍聚餐</span>
          </div>
          <div class="nav-item" data-filter="scene-date">
            <span class="icon">💕</span>
            <span>约会用餐</span>
          </div>
          <div class="nav-item" data-filter="scene-night">
            <span class="icon">🌙</span>
            <span>深夜食堂</span>
          </div>
        </div>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部导航栏 -->
      <header class="top-nav">
        <div class="location-selector">
          <span>📍</span>
          <span id="currentCity">北京</span>
          <span>▼</span>
        </div>
        
        <div class="search-bar">
          <div class="search-box" id="searchBox">
            <span>🔍</span>
            <input type="text" placeholder="搜索大学城美食、商家..." readonly>
          </div>
        </div>

        <div class="top-nav-actions">
          <button class="icon-btn" title="消息">🔔</button>
          <div class="user-avatar" id="userAvatar">👤</div>
        </div>
      </header>

      <!-- 地图容器 -->
      <div class="map-container">
        <div id="amap-container"></div>
        
        <!-- 地图覆盖控件 -->
        <div class="map-overlay">
          <div class="filter-chips">
            <div class="filter-chip active" data-type="all">全部</div>
            <div class="filter-chip" data-type="1">🍔 快餐</div>
            <div class="filter-chip" data-type="2">☕ 饮品</div>
            <div class="filter-chip" data-type="3">🍰 甜品</div>
            <div class="filter-chip" data-type="4">🍜 小吃</div>
            <div class="filter-chip" data-type="5">🍽️ 正餐</div>
          </div>
        </div>

        <!-- 地图图例 -->
        <div class="map-legend">
          <div class="legend-title">实时状态</div>
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--status-idle);"></div>
            <span>空闲</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--status-busy);"></div>
            <span>忙碌</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--status-full);"></div>
            <span>满客</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--status-queue);"></div>
            <span>排队</span>
          </div>
        </div>
      </div>

      <!-- 底部Sheet -->
      <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-handle" id="sheetHandle">
          <div class="handle-bar"></div>
        </div>
        
        <div class="bottom-sheet-content">
          <!-- 筛选器 -->
          <div class="sheet-filters">
            <div class="sheet-filter">
              <span>💰</span>
              <span>价格</span>
              <span>▼</span>
            </div>
            <div class="sheet-filter">
              <span>📏</span>
              <span>距离</span>
              <span>▼</span>
            </div>
            <div class="sheet-filter">
              <span>🏷️</span>
              <span>类型</span>
              <span>▼</span>
            </div>
            <div class="sheet-filter">
              <span>⚡</span>
              <span>排序</span>
              <span>▼</span>
            </div>
          </div>

          <!-- Tab切换 -->
          <div class="sheet-tabs">
            <div class="sheet-tab active" data-tab="ranking">📊 排行榜</div>
            <div class="sheet-tab" data-tab="recent">🕐 最近浏览</div>
          </div>

          <!-- 商家卡片流 -->
          <div class="merchant-carousel" id="merchantCarousel">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <!-- 右侧详情页 -->
      <div class="detail-panel" id="detailPanel">
        <div class="detail-header" id="detailHeader">
          <button class="detail-close" id="detailClose">✕</button>
          <button class="detail-favorite" id="detailFavorite">🤍</button>
          <span id="detailEmoji">🍜</span>
        </div>
        
        <div class="detail-content" id="detailContent">
          <!-- 动态生成 -->
        </div>
      </div>
    </main>
  </div>
